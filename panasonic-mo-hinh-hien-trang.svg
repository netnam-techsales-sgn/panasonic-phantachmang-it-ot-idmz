<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A1628"/>
      <stop offset="1" stop-color="#101f35"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <style>
      .title{fill:#fff;font-size:30px;font-weight:800}
      .sub{fill:#94A3B8;font-size:15px}
      .zoneTitle{fill:#E2E8F0;font-size:18px;font-weight:800}
      .nodeTitle{fill:#fff;font-size:16px;font-weight:800}
      .nodeSub{fill:#CBD5E1;font-size:12px}
      .small{fill:#94A3B8;font-size:12px}
      .warn{fill:#F59E0B;font-size:13px;font-weight:700}
      .link{stroke:#64748B;stroke-width:3;fill:none}
      .fiber{stroke:#00BFA5;stroke-width:5;fill:none;stroke-dasharray:10 8}
      .fw{fill:#7f1d1d;stroke:#EF4444;stroke-width:2}
      .core{fill:#123d6f;stroke:#3B82F6;stroke-width:2}
      .access{fill:#064e45;stroke:#00BFA5;stroke-width:2}
      .ot{fill:#3b246b;stroke:#7C3AED;stroke-width:2}
      .wan{fill:#1f2937;stroke:#94A3B8;stroke-width:2}
      .note{fill:#271a08;stroke:#F59E0B;stroke-width:1.5}
