  <text x="230" y="900" class="sub">Đã có dấu hiệu tách OT qua firewall, nhưng chưa thể hiện rõ IDMZ và các server trung gian cho luồng trao đổi IT/OT.</text>
  <text x="230" y="923" class="sub">Cần kiểm tra lại VLAN, routing, gateway, firewall rule, logging, năng lực HA và khả năng tách access IT/OT.</text>
