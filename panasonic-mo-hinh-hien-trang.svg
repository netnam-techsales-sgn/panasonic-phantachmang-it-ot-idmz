  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="58" y="62" class="title">PANASONIC - Mô hình mạng hiện trạng</text>
  <text x="58" y="90" class="sub">Hai nhà máy kết nối qua fiber; Fortigate/Cisco 350 đang đảm nhiệm các vai trò gateway, core/distribution và tách OT sơ bộ.</text>

  <rect x="54" y="124" width="1492" height="112" rx="20" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
